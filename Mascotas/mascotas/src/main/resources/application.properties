spring.application.name=mascotas
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/ms-mascota

spring.datasource.username=root
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true

jwt.secret=clave_super_secreta_12345678901234567890

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.hateoas.enabled=false
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocHateoasConfiguration
