spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ms-auth
              uri: lb://ms-auth
              predicates:
                - Path=/auth/**

            - id: citas
              uri: lb://citas
              predicates:
                - Path=/api/v1/citas/**

            - id: mascotas
              uri: lb://mascotas
              predicates:
                - Path=/api/v1/mascotas/**

            - id: usuarios
              uri: lb://usuarios
              predicates:
                - Path=/api/usuarios/**

            - id: facturacion
              uri: lb://facturacion
              predicates:
                - Path=/api/v1/facturacion/**

            - id: tratamientos
              uri: lb://tratamientos
              predicates:
                - Path=/api/v1/tratamientos/**

            - id: inventario
              uri: lb://inventario
              predicates:
                - Path=/api/inventario/**

            - id: resena
              uri: lb://resena
              predicates:
                - Path=/api/v1/resena/**

            - id: historial-medico
              uri: lb://historial-medico
              predicates:
                - Path=/api/v1/historiales/**

            - id: veterinarios
              uri: lb://veterinarios
              predicates:
                - Path=/api/v1/veterinarios/**

server:
  port: "${PORT:8080}"

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_URL:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true
