services:

  # ─── Bases de datos ───────────────────────────────────────────────────────
  mysql-auth:
    image: mysql:8
    container_name: mysql-auth
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-user
      MYSQL_USER: appuser
      MYSQL_PASSWORD: "1234"
    ports:
      - "3310:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    networks:
      - veterinaria-network

  mysql-veterinarios:
    image: mysql:8
    container_name: mysql-veterinarios
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-veterinario
      MYSQL_USER: appuser
      MYSQL_PASSWORD: "1234"
    ports:
      - "3311:3306"
    volumes:
      - mysql_veterinarios_data:/var/lib/mysql
    networks:
      - veterinaria-network

  mysql-mascotas:
