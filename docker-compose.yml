    container_name: mysql-inventario
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-inventario
      MYSQL_USER: appuser
      MYSQL_PASSWORD: "1234"
    ports:
      - "3316:3306"
    volumes:
      - mysql_inventario_data:/var/lib/mysql
    networks:
      - veterinaria-network

  mysql-resena:
    image: mysql:8
    container_name: mysql-resena
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-resena
      MYSQL_USER: appuser
      MYSQL_PASSWORD: "1234"
    ports:
      - "3317:3306"
    volumes:
      - mysql_resena_data:/var/lib/mysql
    networks:
      - veterinaria-network

  mysql-citas:
    image: mysql:8
    container_name: mysql-citas
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-citas
      MYSQL_USER: appuser
      MYSQL_PASSWORD: "1234"
    ports:
      - "3318:3306"
    volumes:
