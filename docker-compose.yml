  mysql-historial:
    image: mysql:8
    container_name: mysql-historial
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-historial_medico
      MYSQL_USER: appuser
      MYSQL_PASSWORD: "1234"
    ports:
      - "3319:3306"
    volumes:
      - mysql_historial_data:/var/lib/mysql
    networks:
      - veterinaria-network

  # ─── Infraestructura ──────────────────────────────────────────────────────
  ms-eureka:
    build: ./ms-eureka
    container_name: ms-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - veterinaria-network

  ms-gateway:
    build: ./ms-gateway
    container_name: ms-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      - ms-eureka
    networks:
      - veterinaria-network

  # ─── Microservicios ────────────────────────────────────────────────────────
  ms-auth:
    build: ./ms-auth/ms-auth
    container_name: ms-auth
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      DB_HOST: mysql-auth
      DB_PORT: 3306
      DB_NAME: ms-user
      DB_USER: appuser
      DB_PASSWORD: "1234"
      JWT_SECRET: ${JWT_SECRET:-clave_veterinaria_super_secreta_2026_muy_larga}
      EUREKA_URL: http://ms-eureka:8761/eureka/
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG
    depends_on:
      - mysql-auth
      - ms-eureka
    networks:
      - veterinaria-network

  ms-veterinarios:
    build: ./Veterinarios/Veterinarios/Veterinarios
    container_name: ms-veterinarios
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      DB_HOST: mysql-veterinarios
      DB_PORT: 3306
      DB_NAME: ms-veterinario
      DB_USER: appuser
      DB_PASSWORD: "1234"
      JWT_SECRET: ${JWT_SECRET:-clave_veterinaria_super_secreta_2026_muy_larga}
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      - mysql-veterinarios
      - ms-auth
      - ms-eureka
    networks:
      - veterinaria-network

  ms-mascotas:
    build: ./Mascotas/mascotas
    container_name: ms-mascotas
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      DB_HOST: mysql-mascotas
      DB_PORT: 3306
      DB_NAME: ms-mascota
      DB_USER: appuser
      DB_PASSWORD: "1234"
      JWT_SECRET: ${JWT_SECRET:-clave_veterinaria_super_secreta_2026_muy_larga}
      EUREKA_URL: http://ms-eureka:8761/eureka/
