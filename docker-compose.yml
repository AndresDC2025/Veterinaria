    container_name: mysql-mascotas
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-mascota
      MYSQL_USER: appuser
      MYSQL_PASSWORD: "1234"
    ports:
      - "3312:3306"
    volumes:
      - mysql_mascotas_data:/var/lib/mysql
    networks:
      - veterinaria-network

  mysql-usuarios:
