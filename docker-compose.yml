      DB_USER: appuser
      DB_PASSWORD: "1234"
      JWT_SECRET: ${JWT_SECRET:-clave_veterinaria_super_secreta_2026_muy_larga}
      EUREKA_URL: http://ms-eureka:8761/eureka/
